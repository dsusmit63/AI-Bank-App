name: CI Workflow
on:
  workflow_dispatch:
permissions:
  contents: read
  security-events: write
jobs:
  # ============================================================
  # GATE 1: SECRET SCANNING (Gitleaks)
  # ============================================================
  secret-scan:
    name: Secret Scan - Gitleaks
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v3
        env:
           GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  # ============================================================
  # GATE 2: LINT - Java Checkstyle
  # ============================================================
  lint:
    name: Lint - Checkstyle
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven
      - name: Run Checkstyle
        run: |
          mvn checkstyle:check
      - name: Verify Checkstyle Report
        run: test -f target/checkstyle-result.xml
      - name: Upload Checkstyle Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: checkstyle-report
          path: target/checkstyle-result.xml
  # =============================================================
  # GATE 3: SAST - Static Application Security Testing
  # =============================================================
  sast:
    name: SAST - Semgrep
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      - name: Run Semgrep SAST Scan
        uses: semgrep/semgrep-action@v1
        with:
          config: |
            p/java
            p/owasp-top-ten
            p/secrets
          generateSarif: "1"
      - name: Upload SARIF Report to GitHub Security
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: semgrep.sarif
  # ==============================================================
  # GATE 4: SCA - Software Composition Analysis
  # ==============================================================
  sca:
    name: SCA - Owasp Dependency Check
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven
      - name: Cache OWASP NVD Database
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository/org/owasp/dependency-check-data
          key: owasp-nvd-${{ runner.os }}-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            owasp-nvd-${{ runner.os }}-
      - name: Debug Dependency Check Cache
        if: always()
        run: |
          find ~/.m2 -type d | grep dependency || true
      # Currently set to 11 for pipeline validation.
      # Later reduce to 7 or 8 for production security gating.
      - name: Run OWASP Dependency Check
        env:
          NVD_API_KEY: ${{ secrets.NVD_API_KEY }}
        run: |
           mvn -B org.owasp:dependency-check-maven:check \
              -DfailBuildOnCVSS=11 \
              -DnvdApiKey="${NVD_API_KEY}"
      - name: Verify Dependency Check Report
        if: always()
        run: |
          test -f target/dependency-check-report.html
      - name: Upload Dependency Check Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: owasp-dependency-check-report
          path: target/dependency-check-report.html
  # ================================================================
  # GATE 5: BUILD
  # ================================================================
  build:
    name: Build & Package
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [secret-scan,lint,sast,sca]
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven
      - name: Build with Maven
        run: mvn -B clean package -DskipTests
      - name: Verify JAR File
        run: ls -la target/*.jar
      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: app-jar
          path: target/*.jar
  # ================================================================
  # IMAGE SCAN - TRIVY
  # ================================================================
  image-scan:
    name: Image Scan
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      - name: Build Docker Image
        run: docker build --pull -t bankapp:scan-${{github.sha}} .
      - name: Cache Trivy DB
        uses: actions/cache@v4
        with:
          path: ~/.cache/trivy
          key: trivy-db-${{ runner.os }}-${{ github.run_id }}
          restore-keys: |
            trivy-db-${{ runner.os }}-
      - name: Run Trivy Image Scan
        uses: aquasecurity/trivy-action@master
        # keeping exit-code as '0' to avoid pipeline failures, later use exit-code as '1'
        with:
          image-ref: bankapp:scan-${{ github.sha }}
          format: 'table'
          exit-code: '0'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'
          output: trivy-report.txt
          trivy-config: trivy.yaml
      - name: Verify Trivy Report
        if: always()
        run: test -f trivy-report.txt
      - name: Upload Trivy Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: trivy-scan-report
          path: trivy-report.txt

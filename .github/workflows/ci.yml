name: CI Workflow
on:
  workflow_dispatch:
permissions:
  contents: read
  security-events: write
jobs:
  # ============================================================
  # GATE 1: SECRET SCANNING (Gitleaks)
  # ============================================================
  gitleaks:
    name: Secret Scan - Gitleaks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v3
        env:
           GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

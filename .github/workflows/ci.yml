name: CI Workflow
on:
  workflow_dispatch:
permissions:
  contents: read
  security-events: write
jobs:
  # ============================================================
  # GATE 1: SECRET SCANNING (Gitleaks)
  # ============================================================
  gitleaks:
    name: Secret Scan - Gitleaks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v3
        env:
           GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  # ============================================================
  # GATE 2: LINT - Java Checkstyle
  # ============================================================
  lint:
    name: Lint - Checkstyle
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven
      - name: Run Checkstyle
        run: mvn checkstyle:check || true # Audit mode for now to avoid blocking on style, later use Strict mode
